name: Python package (Windows 3.11)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-lint:
    # Hardcoded to Windows
    runs-on: windows-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          # Hardcoded to 3.11
          python-version: '3.11'

      - name: Install main dep
        run: pip install .

      - name: Install main dev dep
        run: pip install "pytest==9.0.3"
        
      - name: Install main dev dep
        run: pip install "pytest-cov==7.1.0"
      
      - name: Install main dev dep
        run: pip install "ruff==0.15.12"

        

      - name: Lint with Ruff
        run: ruff check .

      - name: Test with Pytest and Coverage
        run: |
          pytest --cov=. --cov-report=xml

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-windows-py3.11
          path: coverage.xml
