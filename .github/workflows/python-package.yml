name: Python package

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-lint:
    strategy:
      # If one job fails (e.g., Windows Python 3.9), let the others finish
      fail-fast: false 
      matrix:
        # Define your Operating Systems here
        os: [ubuntu-latest, windows-latest, macos-latest]
        # Define your Python versions here
        python-version: ["3.9", "3.10", "3.11"]

    # Use the OS defined in the matrix for this specific job
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: "1.8.3"
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Virtual Environment
        id: cached-poetry-dependencies
        uses: actions/cache@v3
        with:
          path: .venv
          # The cache key includes the OS, so Windows, Mac, and Linux don't share the same cache!
          key: venv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        run: poetry install --no-interaction --no-root

      - name: Lint with Ruff
        run: poetry run ruff check .

      - name: Test with Pytest and Coverage
        run: |
          poetry run pytest --cov=. --cov-report=xml

      # (Optional) We upload coverage, but prefix the name with the OS and Python version
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}-py${{ matrix.python-version }}
          path: coverage.xml
